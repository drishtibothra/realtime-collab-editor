<!DOCTYPE html>
<html>
<head><title>WebSocket Relay Test</title></head>
<body>
  <h2>Document: <span id="docId"></span></h2>
  <input id="msgInput" placeholder="Type a message..." style="width: 300px;" />
  <button onclick="send()">Send</button>
  <ul id="messages"></ul>

  <script>
    const documentId = "test-doc-1";
    document.getElementById("docId").textContent = documentId;

    const ws = new WebSocket(`ws://127.0.0.1:8000/ws/${documentId}`);

    ws.onmessage = (event) => {
      const li = document.createElement("li");
      li.textContent = "Received: " + event.data;
      document.getElementById("messages").appendChild(li);
    };

    ws.onopen = () => console.log("Connected");
    ws.onclose = () => console.log("Disconnected");

    function send() {
      const input = document.getElementById("msgInput");
      ws.send(input.value);
      input.value = "";
    }
  </script>
</body>
</html>
